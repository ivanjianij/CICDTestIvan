name: CI-CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: Upload JAR artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.jar

  aws-package:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package application
        run: mvn -B -DskipTests clean package

      - name: Prepare deploy bundle
        run: |
          mkdir -p dist
          cp target/*.jar dist/app.jar
          cp buildspec.yml dist/buildspec.yml

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: aws-deploy-bundle
          path: dist/
