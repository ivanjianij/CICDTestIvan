version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  build:
    commands:
      - mvn -B -f backend/pom.xml clean verify

  post_build:
    commands:
      - rm -rf dist
      - mkdir -p dist/scripts
      - cp backend/target/*.jar dist/app.jar
      - cp infra/codedeploy/appspec.yml dist/appspec.yml
      - cp infra/codedeploy/scripts/*.sh dist/scripts/

artifacts:
  base-directory: dist
  files:
    - "**/*"
